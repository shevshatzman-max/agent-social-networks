name: Daily data refresh

# Every morning this regenerates data.json from live sources and commits it.
# Because GitHub Pages is set to "Deploy from a branch", that commit makes the
# live site redeploy automatically — no extra deploy step needed.

on:
  schedule:
    - cron: "30 6 * * *"   # 06:30 UTC daily — adjust to your morning
  workflow_dispatch: {}      # also lets you run it on demand from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh live metrics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/refresh.py

      - name: Commit if changed
        run: |
          git config user.name  "data-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: daily data refresh ($(date -u +%F))"
          git push
